<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frosted Vellum Invitation Cover</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #070605;
      }

      .vellum-cover {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 46%, rgba(196, 151, 88, 0.16), transparent 35%),
          radial-gradient(circle at 50% 100%, rgba(255, 237, 199, 0.08), transparent 34%),
          #070605;
        color: #fff8ed;
        padding: 24px;
      }

      .vellum-cover::before,
      .vellum-cover::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .vellum-cover::before {
        background:
          repeating-linear-gradient(96deg, rgba(255, 250, 239, 0.055) 0 1px, transparent 1px 12px),
          repeating-linear-gradient(0deg, rgba(255, 250, 239, 0.035) 0 1px, transparent 1px 9px);
        opacity: 0.7;
        mix-blend-mode: screen;
      }

      .vellum-cover::after {
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.16) 0 0.7px, transparent 0.9px),
          radial-gradient(circle, rgba(60, 42, 28, 0.2) 0 0.6px, transparent 0.9px);
        background-position: 0 0, 12px 17px;
        background-size: 26px 26px, 31px 31px;
        opacity: 0.18;
      }

      .vellum-open-target {
        position: relative;
        display: grid;
        width: min(460px, calc(100vw - 24px));
        min-height: min(760px, calc(100vh - 24px));
        place-items: center;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        perspective: 1300px;
        user-select: none;
      }

      .vellum-open-target:focus-visible {
        outline: 2px solid rgba(255, 244, 219, 0.9);
        outline-offset: 8px;
      }

      .vellum-glow {
        position: absolute;
        width: 94%;
        aspect-ratio: 0.64;
        border-radius: 50%;
        background: rgba(255, 239, 202, 0.24);
        filter: blur(54px);
        transform: translateY(18px);
      }

      .vellum-envelope,
      .inner-invitation-card {
        position: absolute;
        width: min(420px, 88vw);
      }

      .vellum-envelope {
        top: 50%;
        height: min(640px, calc(100vh - 112px));
        transform: translateY(-50%);
        transform-style: preserve-3d;
        filter: drop-shadow(0 34px 80px rgba(0, 0, 0, 0.34));
      }

      .vellum-back,
      .vellum-flap {
        position: absolute;
        border: 1px solid rgba(255, 248, 230, 0.44);
        backdrop-filter: blur(18px) saturate(1.12);
        -webkit-backdrop-filter: blur(18px) saturate(1.12);
      }

      .vellum-back {
        inset: 22px 30px 16px;
        z-index: 1;
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 253, 245, 0.95), rgba(239, 232, 213, 0.9)),
          repeating-linear-gradient(90deg, rgba(126, 106, 69, 0.045) 0 1px, transparent 1px 12px);
        box-shadow:
          inset 0 0 42px rgba(168, 140, 91, 0.08),
          0 28px 70px rgba(0, 0, 0, 0.26);
      }

      .vellum-flap {
        top: 7px;
        bottom: 7px;
        z-index: 4;
        width: 54%;
        overflow: hidden;
        background:
          linear-gradient(145deg, rgba(236, 239, 201, 0.62), rgba(218, 225, 178, 0.36)),
          repeating-linear-gradient(100deg, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 13px);
        box-shadow:
          inset 0 0 34px rgba(255, 255, 255, 0.12),
          inset 0 -20px 52px rgba(116, 122, 76, 0.08);
        transition: transform 1080ms cubic-bezier(0.2, 0.76, 0.18, 1), opacity 720ms ease;
      }

      .vellum-flap-top {
        display: none;
      }

      .vellum-flap-left {
        left: 0;
        border-radius: 8px 28px 28px 8px;
        clip-path: polygon(0 0, 100% 0, 92% 16%, 100% 30%, 90% 45%, 100% 61%, 92% 78%, 100% 100%, 0 100%);
        transform-origin: left center;
      }

      .vellum-flap-right {
        right: 0;
        border-radius: 28px 8px 8px 28px;
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 8% 78%, 0 62%, 10% 45%, 0 30%, 8% 16%);
        transform-origin: right center;
      }

      .floral-foil {
        position: absolute;
        z-index: 5;
        top: 8%;
        width: 52%;
        height: 84%;
        fill: none;
        stroke: rgba(112, 126, 74, 0.72);
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.35;
        filter:
          drop-shadow(0 0 1px rgba(255, 249, 196, 0.38))
          drop-shadow(0 1px 0 rgba(255, 255, 255, 0.25));
        opacity: 0.92;
        pointer-events: none;
        transition: transform 1080ms cubic-bezier(0.2, 0.76, 0.18, 1), opacity 720ms ease;
      }

      .floral-foil-left {
        left: 1%;
        transform-origin: left center;
      }

      .floral-foil-right {
        right: 1%;
        transform: scaleX(-1);
        transform-origin: right center;
      }

      .vellum-seal {
        position: absolute;
        z-index: 6;
        left: 50%;
        top: 56%;
        display: grid;
        width: 70px;
        aspect-ratio: 1;
        place-items: center;
        border: 1px solid rgba(255, 231, 168, 0.76);
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 244, 200, 0.5), transparent 23%),
          linear-gradient(145deg, rgba(164, 129, 56, 0.86), rgba(87, 70, 31, 0.9));
        color: #fff0b8;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 25px;
        transform: translate(-50%, -50%);
        transition: transform 620ms ease, opacity 520ms ease;
        box-shadow:
          inset 0 2px 6px rgba(255, 255, 255, 0.22),
          inset 0 -4px 10px rgba(44, 31, 10, 0.32),
          0 14px 28px rgba(0, 0, 0, 0.25);
      }

      .vellum-seal::before {
        content: "";
        position: absolute;
        inset: 9px;
        border: 1px solid rgba(255, 238, 188, 0.58);
        border-radius: 50%;
      }

      .inner-invitation-card {
        top: 50%;
        z-index: 2;
        display: grid;
        min-height: min(560px, calc(100vh - 184px));
        align-content: center;
        justify-items: center;
        gap: 10px;
        border: 1px solid rgba(160, 137, 92, 0.28);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.98), rgba(242, 235, 218, 0.96)),
          repeating-linear-gradient(90deg, rgba(121, 89, 48, 0.055) 0 1px, transparent 1px 11px);
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.24);
        color: #2f2418;
        opacity: 0;
        padding: 40px 32px;
        text-align: center;
        transform: translateY(-44%) scale(0.94);
        transition:
          opacity 520ms ease 260ms,
          transform 1080ms cubic-bezier(0.2, 0.76, 0.18, 1) 260ms;
      }

      .inner-invitation-card strong {
        max-width: 8.6ch;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(48px, 11vw, 76px);
        font-weight: 500;
        line-height: 0.9;
      }

      .inner-kicker,
      .inner-invitation-card span:last-child,
      .vellum-copy span,
      .vellum-copy em,
      .tap-hint,
      .transition-ready {
        font-size: 11px;
        font-style: normal;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .inner-kicker,
      .inner-invitation-card span:last-child {
        color: #a87635;
      }

      .vellum-copy {
        position: absolute;
        z-index: 7;
        top: calc(50% - 205px);
        display: grid;
        justify-items: center;
        gap: 12px;
        width: min(330px, 76vw);
        color: rgba(255, 241, 184, 0.96);
        text-align: center;
        text-shadow:
          0 1px 0 rgba(78, 62, 29, 0.54),
          0 0 18px rgba(255, 219, 134, 0.18);
        transition: opacity 420ms ease, transform 420ms ease;
      }

      .tap-hint {
        pointer-events: auto;
      }

      .vellum-copy strong {
        max-width: 8.4ch;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(46px, 11vw, 72px);
        font-weight: 500;
        line-height: 0.9;
        background: linear-gradient(110deg, #fff2b9, #a88032 34%, #fff6c8 52%, #8b6a27 72%, #fff0ae);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .vellum-copy em {
        color: #f0d5a5;
      }

      .tap-hint,
      .transition-ready {
        position: absolute;
        bottom: clamp(16px, 3vh, 28px);
        z-index: 8;
        display: inline-grid;
        min-height: 58px;
        min-width: 58px;
        place-items: center;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #ffe3b3;
        padding: 0;
        transition: opacity 420ms ease, transform 420ms ease;
      }

      .tap-hint::before,
      .tap-hint::after {
        content: "";
        position: absolute;
        border-radius: 50%;
      }

      .tap-hint::before {
        width: 52px;
        aspect-ratio: 1;
        border: 1px solid rgba(255, 226, 178, 0.7);
        box-shadow: 0 0 24px rgba(255, 217, 154, 0.18);
      }

      .tap-hint::after {
        width: 13px;
        aspect-ratio: 1;
        background: #ffe3b3;
        box-shadow: 0 0 18px rgba(255, 227, 179, 0.72);
      }

      .tap-hint span {
        position: absolute;
        width: 78px;
        height: 78px;
        border: 1px solid rgba(255, 226, 178, 0.22);
        border-radius: 50%;
        animation: tapPulse 1800ms ease-out infinite;
      }

      .transition-ready {
        opacity: 0;
        transform: translateY(18px);
      }

      .vellum-cover.is-opening .vellum-flap-top {
        opacity: 0;
      }

      .vellum-cover.is-opening .vellum-flap-left {
        opacity: 0.9;
        transform: rotateY(-108deg) translateX(-8px);
      }

      .vellum-cover.is-opening .vellum-flap-right {
        opacity: 0.9;
        transform: rotateY(108deg) translateX(8px);
      }

      .vellum-cover.is-opening .floral-foil-left {
        opacity: 0.72;
        transform: rotateY(-108deg) translateX(-8px);
      }

      .vellum-cover.is-opening .floral-foil-right {
        opacity: 0.72;
        transform: scaleX(-1) rotateY(-108deg) translateX(-8px);
      }

      .vellum-cover.is-opening .inner-invitation-card {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }

      .vellum-cover.is-opening .vellum-copy {
        opacity: 0;
        transform: translateY(-18px);
      }

      .vellum-cover.is-opening .vellum-seal {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.62);
      }

      .vellum-cover.is-opening .tap-hint {
        opacity: 0;
        transform: translateY(8px);
      }

      @keyframes tapPulse {
        0% {
          opacity: 0.88;
          transform: scale(0.62);
        }

        100% {
          opacity: 0;
          transform: scale(1.18);
        }
      }

      .vellum-cover.is-opening .transition-ready {
        opacity: 1;
        transform: translateY(0);
        transition-delay: 1200ms;
      }
    </style>
  </head>
  <body>
    <section class="vellum-cover" aria-label="Open wedding invitation">
      <div class="vellum-open-target" role="button" tabindex="0" aria-label="Open invitation">
        <span class="vellum-glow" aria-hidden="true"></span>
        <span class="inner-invitation-card">
          <span class="inner-kicker">You are invited</span>
          <strong>Alya &amp; Adam</strong>
          <span>August 22, 2026</span>
        </span>
        <span class="vellum-envelope" aria-hidden="true">
          <span class="vellum-back"></span>
          <span class="vellum-flap vellum-flap-left"></span>
          <span class="vellum-flap vellum-flap-right"></span>
          <svg class="floral-foil floral-foil-left" viewBox="0 0 220 520">
            <path d="M36 438 C64 374 47 321 87 257 C119 206 116 151 91 85" />
            <path d="M61 394 C31 383 19 354 33 333 C51 304 94 318 95 353 C96 380 81 394 61 394Z" />
            <path d="M54 350 C82 336 96 349 91 373 M36 338 C57 357 57 379 48 392" />
            <path d="M111 278 C80 260 77 219 106 204 C139 186 170 223 151 254 C141 272 128 282 111 278Z" />
            <path d="M105 211 C125 233 126 254 112 276 M145 214 C128 231 113 248 106 272" />
            <path d="M96 142 C63 125 62 85 88 68 C119 49 153 82 139 116 C131 137 116 146 96 142Z" />
            <path d="M88 72 C105 96 109 117 98 139 M134 78 C118 97 104 117 96 140" />
            <path d="M113 329 C145 305 180 319 184 350 C188 382 149 404 124 379 C105 361 103 345 113 329Z" />
            <path d="M120 331 C142 349 144 365 128 380 M179 345 C156 349 139 360 121 376" />
            <path d="M87 257 C56 238 43 210 49 183 M92 247 C124 238 151 211 159 177" />
            <path d="M88 259 C58 273 42 300 39 326 M93 254 C129 264 160 282 177 314" />
          </svg>
          <svg class="floral-foil floral-foil-right" viewBox="0 0 220 520">
            <path d="M36 438 C64 374 47 321 87 257 C119 206 116 151 91 85" />
            <path d="M61 394 C31 383 19 354 33 333 C51 304 94 318 95 353 C96 380 81 394 61 394Z" />
            <path d="M54 350 C82 336 96 349 91 373 M36 338 C57 357 57 379 48 392" />
            <path d="M111 278 C80 260 77 219 106 204 C139 186 170 223 151 254 C141 272 128 282 111 278Z" />
            <path d="M105 211 C125 233 126 254 112 276 M145 214 C128 231 113 248 106 272" />
            <path d="M96 142 C63 125 62 85 88 68 C119 49 153 82 139 116 C131 137 116 146 96 142Z" />
            <path d="M88 72 C105 96 109 117 98 139 M134 78 C118 97 104 117 96 140" />
            <path d="M113 329 C145 305 180 319 184 350 C188 382 149 404 124 379 C105 361 103 345 113 329Z" />
            <path d="M120 331 C142 349 144 365 128 380 M179 345 C156 349 139 360 121 376" />
            <path d="M87 257 C56 238 43 210 49 183 M92 247 C124 238 151 211 159 177" />
            <path d="M88 259 C58 273 42 300 39 326 M93 254 C129 264 160 282 177 314" />
          </svg>
          <span class="vellum-seal">A+A</span>
        </span>
        <span class="vellum-copy">
          <span>You are invited</span>
          <strong>Alya &amp; Adam</strong>
          <em>August 22, 2026</em>
        </span>
        <span class="tap-hint" aria-hidden="true"><span></span></span>
        <span class="transition-ready">ready to transition</span>
      </div>
    </section>
    <script>
      const cover = document.querySelector(".vellum-cover");
      const target = document.querySelector(".vellum-open-target");

      function openCover() {
        if (cover.classList.contains("is-opening")) return;
        cover.classList.add("is-opening");
      }

      target.addEventListener("click", openCover);
      target.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openCover();
        }
      });
    </script>
  </body>
</html>
